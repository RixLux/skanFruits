site_name: "skanFruits Documentation"
site_description: "Documentation"
site_url: "https://rixlux.github.io/skanFruits/"

repo_name: "RixLux/skanFruits"
repo_url: "https://github.com/RixLux/skanFruits"

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep-purple
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - pymdownx.tasklist:
      custom_checkbox: true
  - def_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - tables

plugins:
  - search
  - swagger-ui-tag
  # - render_swagger

extra_css:
  - stylesheets/extra.css

nav:
  - Home: index.md
  - CHANGELOG: CHANGELOG.md
  - Master Plan: Master_plan.md
  - PRD: PRD.md
  - CHANGELOG: .backup/20260525_000938/CHANGELOG.md
  - Master Plan: .backup/20260525_000938/Master_plan.md
  - PRD: .backup/20260525_000938/PRD.md
